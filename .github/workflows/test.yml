name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests with coverage (exclude examples)
        run: |
          go test -v -race -coverprofile=coverage.out -coverpkg=./... $(go list ./... | grep -v /examples/)

      - name: Run example tests
        run: |
          go test -v -race ./examples/...

      - name: Vet (with waiver for intentional unsafe.Pointer materialization)
        run: |
          vet_output=$(go vet ./... 2>&1 || true)
          filtered_output=$(echo "$vet_output" | grep -v -E "possible misuse of unsafe.Pointer|^#" || true)
          if [ -n "$filtered_output" ]; then
            echo "$filtered_output"
            exit 1
          fi
          echo "go vet passed (waived unsafe.Pointer(uintptr) pattern in pointer materialization)."

      - name: Generate coverage badge data
        run: |
          COV=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print substr($3, 1, length($3)-1)}')
          if [ -z "$COV" ]; then COV=0; fi

          if [ "${COV%.*}" -ge 90 ]; then COLOR=brightgreen
          elif [ "${COV%.*}" -ge 80 ]; then COLOR=green
          elif [ "${COV%.*}" -ge 70 ]; then COLOR=yellowgreen
          elif [ "${COV%.*}" -ge 60 ]; then COLOR=yellow
          else COLOR=red
          fi

          cat > coverage.json <<JSON
          {"schemaVersion":1,"label":"coverage","message":"${COV}%","color":"${COLOR}","cacheSeconds":3600}
          JSON

      - name: Publish coverage badge
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BLOB=$(git hash-object -w coverage.json)
          TREE=$(printf '100644 blob %s\tcoverage.json\n' "$BLOB" | git mktree)
          COMMIT=$(git commit-tree "$TREE" -m "Update coverage badge")
          git push --force origin "$COMMIT":refs/heads/coverage
